<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fribamestari</title>
    <link rel="stylesheet" href="style.css?v=210">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ASETUKSET NAPPI (Palautettu!) -->
    <div id="settingsBtn" onclick="document.getElementById('settingsModal').style.display='flex'">⚙️</div>

    <!-- Yhteinen tausta -->
    <div id="corkboard-bg"></div>

    <!-- NÄKYMÄT (Välilehdet) -->
    <div id="views-container">
        
        <!-- 1. TULOKSET -->
        <div id="view-results" class="app-view hidden">
            <div id="board-receipt-wrapper" class="view-wrapper" style="margin-top: 20px;"></div>
        </div>

        <!-- 2. LASKELMA -->
        <div id="view-calculator" class="app-view hidden">
            <div id="calc-wrapper" class="view-wrapper" style="margin-top: 20px;"></div>
        </div>

        <!-- 3. OMAT KORTIT -->
        <div id="view-cards" class="app-view hidden">
            <div id="board-binder-wrapper" class="view-wrapper" style="margin-top: 20px;"></div>
        </div>

        <!-- 4. KAUPPA -->
        <div id="view-shop" class="app-view hidden">
            <div id="board-shop-wrapper" class="view-wrapper" style="margin-top: 20px; padding-bottom: 50px;"></div>
        </div>

        <!-- 5. VÄYLÄ (Oletus) -->
        <div id="view-hole" class="app-view active">
            <div id="holes-grid" class="view-wrapper" style="margin-top: 20px;"></div>
        </div>

    </div>

    <!-- ALAVALIKKO -->
    <nav id="bottom-nav">
        <div class="nav-item" onclick="window.switchView('view-results')">
            <div class="nav-icon">🧾</div>
            <span>Tulokset</span>
        </div>
        <div class="nav-item" onclick="window.switchView('view-calculator')">
            <div class="nav-icon">💰</div>
            <span>Laskelma</span>
        </div>
        <div class="nav-item" onclick="window.switchView('view-cards')">
            <div class="nav-icon">🃏</div>
            <span>Kortit</span>
        </div>
        <div class="nav-item" onclick="window.switchView('view-shop')">
            <div class="nav-icon">🎰</div>
            <span>Kauppa</span>
        </div>
        <div class="nav-item active" onclick="window.switchView('view-hole')">
            <div class="nav-icon">📍</div>
            <span>Väylä</span>
        </div>
    </nav>

    <!-- MODAALIT -->
    
    <!-- ASETUKSET MODAALI (Palautettu!) -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px; text-align:center;">
            <h2 style="font-family:'Kalam', cursive; font-size:2.5rem; margin-bottom:20px;">Asetukset</h2>
            <button class="btn btn-danger" style="width:100%; padding:20px; font-size:1.5rem; font-weight:900; margin-bottom:15px;" onclick="window.resetGame()">NOLLAA PELI</button>
            <button class="btn btn-secondary" style="width:100%; padding:15px; font-size:1.2rem;" onclick="document.getElementById('settingsModal').style.display='none'">SULJE</button>
        </div>
    </div>

    <div id="cardDetailModal" class="modal-overlay">
        <div class="carousel-container" id="cardCarousel"></div>
        <div class="action-area" id="cardDetailActionArea"></div>
        <button class="btn btn-danger fixed-close-btn" onclick="document.getElementById('cardDetailModal').style.display='none'">SULJE KORTTI</button>
    </div>

    <div id="zoomModal" class="modal-overlay" onclick="this.style.display='none'">
        <div id="zoomModalContent"></div>
    </div>

    <div id="scoreModal" class="modal-overlay">
        <div class="modal-content score-modal-paper">
            <div class="tape tape-top" style="width: 120px;"></div>
            <h2>TULOS VÄYLÄLTÄ <span id="scoreModalHoleNum"></span></h2>
            <p style="font-family: 'Kalam', cursive; font-size:1.2rem; margin-bottom:15px; color:#555;">(Par: <span id="scoreModalPar"></span>)</p>
            <div id="scoreInputsContainer" style="display:flex; flex-direction:column; gap:10px;"></div>
            <div style="margin-top:20px; background:rgba(0,0,0,0.05); padding:10px; border-radius:4px; border:2px dashed #94a3b8;">
                <h4 style="margin-top:0; color:#334155;">Tehtävän onnistujat:</h4>
                <div id="taskWinnerContainer"></div>
            </div>
            <div style="display:flex; justify-content:space-between; margin-top:20px;">
                <button class="btn btn-secondary" onclick="document.getElementById('scoreModal').style.display='none'">PERUUTA</button>
                <button class="btn btn-success" onclick="window.saveHoleScores()">TALLENNA</button>
            </div>
        </div>
    </div>

    <div id="targetModal" class="modal-overlay">
        <div class="modal-content">
            <h2>Valitse Kohde</h2>
            <p id="targetModalDesc"></p>
            <div id="targetButtonsContainer"></div>
            <button class="btn btn-secondary" onclick="document.getElementById('targetModal').style.display='none'">PERUUTA</button>
        </div>
    </div>

    <div id="handLimitModal" class="modal-overlay">
        <div class="modal-content limit-modal">
            <h2>✋ Käsikortit Täynnä!</h2>
            <p>Olet ylittänyt maksimikorttien määrän (<span id="handLimitCount"></span>). Sinun on myytävä kortteja, jotta voit jatkaa.</p>
            <div id="handLimitCards" style="margin-top:20px; text-align:left;"></div>
        </div>
    </div>

    <div id="appleToast" class="apple-toast"><span id="appleToastIcon"></span><span id="appleToastText"></span></div>
    <div id="notificationContainer"></div>

    <script src="tasks.js?v=210"></script>
    <script type="module" src="script.js?v=210"></script>
    <script src="game.js?v=210"></script>
    <script src="ui.js?v=210"></script>
    <script src="camera.js?v=210"></script>
</body>
</html>
