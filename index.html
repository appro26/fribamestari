<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fribamestari</title>
    <link rel="stylesheet" href="style.css?v=200">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Taustakuvio (Kiinteä korkkitaulu/seinä) -->
    <div id="app-background"></div>

    <!-- NÄKYMÄT (Välilehdet) -->
    <div id="views-container">
        
        <!-- 1. TULOKSET -->
        <div id="view-results" class="app-view hidden">
            <div id="results-content"></div>
        </div>

        <!-- 2. LASKELMA (Tulosten syöttö) -->
        <div id="view-calculator" class="app-view hidden">
            <div class="calculator-container" id="calculator-content"></div>
        </div>

        <!-- 3. OMAT KORTIT -->
        <div id="view-cards" class="app-view hidden">
            <div id="cards-content"></div>
        </div>

        <!-- 4. KAUPPA -->
        <div id="view-shop" class="app-view hidden">
            <div id="shop-content"></div>
        </div>

        <!-- 5. VÄYLÄ (Oletus) -->
        <div id="view-hole" class="app-view active">
            <div id="hole-content"></div>
        </div>

    </div>

    <!-- ALAVALIKKO (Pyytämässäsi järjestyksessä) -->
    <nav id="bottom-nav">
        <div class="nav-item" onclick="window.switchView('view-results')">
            <div class="nav-icon">📋</div>
            <span>Tulokset</span>
        </div>
        <div class="nav-item" onclick="window.switchView('view-calculator')">
            <div class="nav-icon">🧮</div>
            <span>Laskelma</span>
        </div>
        <div class="nav-item" onclick="window.switchView('view-cards')">
            <div class="nav-icon">🃏</div>
            <span>Kortit</span>
        </div>
        <div class="nav-item" onclick="window.switchView('view-shop')">
            <div class="nav-icon">🎰</div>
            <span>Kauppa</span>
        </div>
        <div class="nav-item active" onclick="window.switchView('view-hole')">
            <div class="nav-icon">⛳</div>
            <span>Väylä</span>
        </div>
    </nav>

    <!-- MODAALIT (Korttien tarkastelu, zoomaukset, viestit) -->
    <div id="cardDetailModal" class="modal-overlay">
        <div class="carousel-container" id="cardCarousel"></div>
        <div class="action-area" id="cardDetailActionArea"></div>
        <button class="btn btn-danger fixed-close-btn" onclick="document.getElementById('cardDetailModal').style.display='none'">SULJE KORTTI</button>
    </div>

    <div id="zoomModal" class="modal-overlay" onclick="this.style.display='none'">
        <div id="zoomModalContent"></div>
    </div>

    <div id="handLimitModal" class="modal-overlay">
        <div class="modal-content limit-modal">
            <h2>✋ Käsikortit Täynnä!</h2>
            <p>Olet ylittänyt maksimikorttien määrän (<span id="handLimitCount"></span>). Sinun on myytävä kortteja, jotta voit jatkaa.</p>
            <div id="handLimitCards" style="margin-top:20px; text-align:left;"></div>
        </div>
    </div>

    <div id="appleToast" class="apple-toast"><span id="appleToastIcon"></span><span id="appleToastText"></span></div>
    <div id="notificationContainer"></div>

    <script src="tasks.js?v=200"></script>
    <script type="module" src="script.js?v=200"></script>
    <script src="game.js?v=200"></script>
    <script src="ui.js?v=200"></script>
    <script src="camera.js?v=200"></script>
</body>
</html>
