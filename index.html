<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fribamestari</title>
    <link rel="apple-touch-icon" href="friba.png">
    
    <link rel="stylesheet" href="style.css?v=10">
    <meta name="theme-color" content="#121212">

    <script>
      window.onerror = function(msg, url, line) { alert("Virhe koodissa: " + msg + " (Rivi: " + line + ")"); };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body class="player-mode">

    <div class="container">
        <div class="role-switcher">
            <button id="btnPlayer" class="role-btn player active" onclick="if(window.setRole) window.setRole('player')">Pelaaja</button>
            <button id="btnGM" class="role-btn gm">Game Master</button>
        </div>

        <div id="identityCard" class="card" style="border: 2px solid var(--primary);">
            <h2>Astu sisään peliin</h2>
            <input type="text" id="playerNameInput" placeholder="Syötä nimesi...">
            <button class="btn btn-primary" onclick="if(window.claimIdentity) window.claimIdentity()">ASTU TII-PAIKALLE</button>
        </div>

        <!-- UUSI: Aloitusruutu, joka näkyy kun peliä ei ole vielä luotu -->
        <div id="gameSetupArea" class="card" style="display:none; text-align:center; border: 2px solid var(--primary);">
            <h2 style="color: var(--text-main); font-size:1.2rem; margin-bottom: 10px;">Peliä ei ole aloitettu</h2>
            <p style="color: var(--text-muted); font-size:0.9rem; margin-bottom: 20px;">Valitse rata ja käynnistä peli.</p>
            <button class="btn btn-primary" onclick="document.getElementById('courseModal').style.display='flex'">ALOITA PELI</button>
        </div>

        <!-- Pelin päänäkymä (Piilotettu kunnes rata valitaan) -->
        <div id="mainGameArea" style="display:none;">
            <div id="courseInfoBanner" class="card" style="background: var(--surface-light); text-align: center; padding: 15px;">
                <div style="font-size: 1rem; color: var(--text-muted); font-weight: 600; margin-bottom: 5px; text-transform: uppercase;" id="bannerCourseName">Rata</div>
                <div style="display: flex; justify-content: center; align-items: baseline; gap: 15px;">
                    <div style="font-size: 1.2rem; color: var(--text-main);">VÄYLÄ <span id="bannerHoleNum" style="font-size: 2rem; font-weight: 900; color: var(--primary);">1</span></div>
                    <div style="font-size: 1.2rem; color: var(--text-muted);">PAR <span id="bannerPar" style="font-size: 1.5rem; font-weight: 800; color: var(--text-main);">3</span></div>
                </div>
            </div>

            <!-- Väylän vaihto -->
            <button class="btn btn-secondary" onclick="if(window.nextHole) window.nextHole()" style="margin-bottom: 16px; font-weight: 900; border-color: var(--primary);">SEURAAVA VÄYLÄ ➡️</button>

            <div id="activeHoleContainer"></div>

            <div class="player-only" id="playerActionArea">
                <div class="card" style="border-left: 5px solid var(--danger); padding-right: 0;">
                    <h2>Omat Kortit kädessä</h2>
                    <div id="playerHand" class="hand-scroll-area"></div>
                </div>
                
                <div class="card" style="border-left: 5px solid var(--warning);">
                    <h2 style="display: flex; justify-content: space-between; align-items: center;">Väylän Kauppa <span id="myResPoints" style="color: var(--warning); font-size: 1.2rem; font-weight: 900;">0 P</span></h2>
                    <div id="shopItems" class="shop-grid"></div>
                </div>
            </div>
        </div> <!-- End mainGameArea -->

        <!-- GM ASETUKSET -->
        <div class="gm-only" style="margin-top: 20px;">
            <button class="btn btn-secondary" onclick="document.getElementById('adminPanel').style.display = document.getElementById('adminPanel').style.display === 'none' ? 'block' : 'none'">⚙️ Hallinta & Lokit</button>
            
            <div id="adminPanel" class="card" style="display:none; margin-top:10px;">
                <h2>Muokkaa Pelaajia</h2>
                <div id="adminPlayerList"></div>
                <div style="display: flex; gap: 10px; margin-top:15px; margin-bottom:15px;">
                    <input type="text" id="adminNewPlayerName" placeholder="Nimi..." style="margin: 0;">
                    <button class="btn btn-success" style="width: auto; padding: 0 20px;" onclick="if(window.adminAddPlayer) window.adminAddPlayer()">Lisää</button>
                </div>

                <h2>Tapahtumalokit</h2>
                <div id="adminEventLog" style="max-height:130px; overflow-y:auto; font-size:0.85rem; background:var(--bg-dark); padding:10px; border-radius:8px; color: var(--text-muted); margin-bottom:15px;"></div>

                <h2>Pistehistoria</h2>
                <div id="adminScoreLog" style="max-height:130px; overflow-y:auto; font-size:0.85rem; background:var(--bg-dark); padding:10px; border-radius:8px; color: var(--text-muted);"></div>

                <button class="btn btn-danger" style="margin-top: 15px;" onclick="if(window.resetGame) window.resetGame()">Nollaa koko peli</button>
            </div>
        </div>

        <div class="card" style="margin-top: 16px;">
            <h2>Tulostaulu (Leaderboard)</h2>
            <div id="playerList"></div>
        </div>
    </div>

    <!-- Modaalit -->
    <!-- UUSI: Radan luonti ja Meilahti-pikapainike -->
    <div id="courseModal" class="winner-overlay" style="display:none;">
        <div class="card" style="width: 100%; max-width: 450px;">
            <h2 style="color:var(--text-main); font-size: 1.2rem;">Aloita Peli</h2>
            
            <button class="btn btn-primary" onclick="if(window.startMeilahti) window.startMeilahti()" style="margin-bottom: 20px; background-color: var(--warning); color: #000;">🌲 Valitse Meilahti (16 väylää, Par 3)</button>
            
            <h2 style="border-top: 1px solid var(--border-metal); padding-top: 15px; margin-top: 15px;">Tai luo oma rata</h2>
            <input type="text" id="setupCourseName" placeholder="Radan nimi (esim. Tali)">
            <input type="number" id="setupHoleCount" placeholder="Väylien määrä" oninput="if(window.generateParInputs) window.generateParInputs()">
            <div id="parInputsContainer" style="max-height: 200px; overflow-y: auto; margin-bottom: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            
            <button class="btn btn-primary" onclick="if(window.saveCourseSetup) window.saveCourseSetup()">Tallenna & Aloita</button>
            <button class="btn btn-secondary" style="margin-top: 10px;" onclick="document.getElementById('courseModal').style.display='none'">Peruuta</button>
        </div>
    </div>

    <!-- KORJATTU: Tuloskortti (scoreModalPar lisätty takaisin) -->
    <div id="scoreModal" class="winner-overlay" style="display:none;">
        <div class="card" style="width: 100%; max-width: 450px;">
            <div style="text-align: center; margin-bottom: 15px;">
                <h2 style="color:var(--text-main); font-size: 1.4rem; margin: 0;">VÄYLÄ <span id="scoreModalHoleNum">1</span></h2>
                <p style="color: var(--text-muted); font-size: 1.1rem; margin-top: 5px;">Par <strong id="scoreModalPar" style="color:var(--text-main);">3</strong></p>
            </div>
            
            <div id="scoreInputsContainer" style="margin-bottom: 20px;"></div>
            
            <div style="background: var(--surface-light); padding: 12px; border-radius: 8px; margin-bottom: 20px;">
                <label style="color: var(--warning); font-size: 0.85rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block;">Väylätehtävän suorittaja (+5 P)</label>
                <select id="taskWinnerSelect" style="margin: 0; background: var(--bg-dark); border: none;"></select>
            </div>

            <button class="btn btn-primary" onclick="if(window.submitScores) window.submitScores()">Tallenna & Arvo uusi väylä</button>
            <button class="btn btn-secondary" style="margin-top: 10px;" onclick="document.getElementById('scoreModal').style.display='none'">Sulje</button>
        </div>
    </div>

    <div id="targetModal" class="winner-overlay" style="display:none;">
        <div class="card" style="width: 100%; max-width: 400px;">
            <h2>Valitse kohdepelaaja</h2>
            <p id="targetCardName" style="color: var(--primary); font-weight: 800; margin-bottom: 15px;"></p>
            <div id="targetPlayerList" style="margin-bottom: 15px;"></div>
            <button class="btn btn-secondary" onclick="document.getElementById('targetModal').style.display='none'">Peruuta</button>
        </div>
    </div>

    <div id="lotteryWinner" class="winner-overlay" style="display:none;">
        <div class="card" style="text-align: center; width: 100%; max-width: 400px; border: 2px solid var(--primary);">
            <h1 id="popupTitle" style="color: var(--text-main); font-size: 1.4rem; margin-bottom: 8px;">Ilmoitus</h1>
            <p id="popupDesc" style="font-size:1rem; color:var(--text-muted); margin-bottom: 12px;"></p>
            <div id="popupDetails" style="background: var(--bg-dark); padding: 12px; border-radius: 8px; font-size: 0.95rem; text-align: left;"></div>
        </div>
    </div>

    <script src="tasks.js?v=10"></script>
    <script type="module" src="script.js?v=10"></script>
</body>
</html>
