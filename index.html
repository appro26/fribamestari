<!DOCTYPE html>
<html lang="fi">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Fribamestari</title>
    
    <script>
        if ('caches' in window) {
            caches.keys().then(function(names) {
                for (let name of names) caches.delete(name);
            });
        }
    </script>

    <link rel="apple-touch-icon" href="friba.png" />
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Inter:wght@400;600;700;800;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=180" />
    <meta id="themeColorMeta" name="theme-color" content="#1e293b" />
    
    <style>
        /* KORJAUS CORKBOARDIN ALALAIDAN JUMIUTUMISEEN */
        #corkboard-surface {
            padding-bottom: 800px !important; /* Antaa kameralle tilaa mennä alas */
            padding-right: 500px !important;
            transform-origin: 0 0;
        }

        /* -------------------------------------------
           RPG KORTTIEN TASOVÄRIT (Pronssi, Hopea, Kulta)
           ------------------------------------------- */
        .tier-1 {
            background: linear-gradient(135deg, #f5d0a9, #c49a6c) !important;
            border: 3px solid #8b5a2b !important;
            box-shadow: inset 0 0 10px rgba(139,90,43,0.3), 0 4px 8px rgba(0,0,0,0.3) !important;
            color: #3e2723 !important;
        }
        .tier-1 .card-type-tag { background: #8b5a2b !important; color: #fff !important; }

        .tier-2 {
            background: linear-gradient(135deg, #e2e8f0, #94a3b8) !important;
            border: 3px solid #475569 !important;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.6), 0 5px 12px rgba(0,0,0,0.4) !important;
            color: #0f172a !important;
        }
        .tier-2 .card-type-tag { background: #475569 !important; color: #fff !important; }

        .tier-3 {
            background: linear-gradient(135deg, #fef08a, #eab308) !important;
            border: 3px solid #a16207 !important;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.8), 0 0 15px rgba(234,179,8,0.6) !important;
            color: #422006 !important;
        }
        .tier-3 .card-type-tag { background: #ca8a04 !important; color: #fff !important; }

        .play-cost-badge {
            background: #111; color: #fff; font-weight: 900; font-size: 0.8rem;
            padding: 4px 8px; border-radius: 4px; border: 2px solid #fff;
            width: fit-content; margin-bottom: 8px; text-transform: uppercase;
        }

        /* -------------------------------------------
           VÄLIPALA-AUTOMAATTI (Vending Machine)
           ------------------------------------------- */
        .vending-machine {
            background: #1e293b;
            border: 8px solid #0f172a;
            border-radius: 12px;
            padding: 20px 10px 40px 10px;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            width: 100%;
            box-sizing: border-box;
            overflow: hidden;
        }
        .vending-glass {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0.05) 60%, rgba(255,255,255,0) 100%);
            pointer-events: none; z-index: 10;
        }
        .vending-shelf {
            background: #334155;
            border-bottom: 6px solid #0f172a;
            padding: 15px 5px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-around;
            position: relative;
            box-shadow: 0 10px 15px rgba(0,0,0,0.5);
        }
        .vending-shelf::after {
            content: ''; position: absolute; bottom: -6px; left: 0; width: 100%; height: 6px;
            background: linear-gradient(to right, #475569, #1e293b);
        }
        .vending-slot {
            position: relative; width: 45%; display: flex; flex-direction: column; align-items: center;
        }
        .vending-coil {
            position: absolute; bottom: 20px; width: 110%; height: 40px;
            background: repeating-linear-gradient(90deg, transparent, transparent 15px, #94a3b8 15px, #94a3b8 20px);
            z-index: 5; opacity: 0.8;
        }
        .empty-slot-text {
            color: #ef4444; font-family: 'Courier Prime', monospace; font-weight: 900; font-size: 1.2rem;
            text-align: center; margin-top: 50px; text-shadow: 0 0 5px rgba(239,68,68,0.5);
        }
        .vending-price-tag {
            background: #000; color: #22c55e; font-family: 'Courier Prime', monospace;
            padding: 4px 10px; border-radius: 4px; border: 2px solid #22c55e;
            font-weight: 900; font-size: 1rem; margin-top: 10px; z-index: 6;
            box-shadow: 0 0 8px rgba(34,197,94,0.4); text-align: center;
        }
        .vending-push-door {
            background: #0f172a; border: 2px solid #334155; height: 60px;
            border-radius: 8px; margin: 20px; display: flex; align-items: center; justify-content: center;
            color: #475569; font-weight: 900; font-size: 1.5rem; letter-spacing: 5px; box-shadow: inset 0 10px 10px rgba(0,0,0,0.8);
        }
        
        /* Korjataan omien korttien lista selkeämmäksi */
        .binder-content {
            width: 100% !important; max-width: 100vw !important; box-sizing: border-box !important;
            padding-right: 15px !important; padding-left: 5px !important; overflow-x: hidden !important;
        }
    </style>

    <script>
      window.onerror = function(msg, url, line) { alert("Virhe: " + msg + " (Rivi: " + line + ")"); };
      
      window.showModalSafe = function(id, displayType) {
          var el = document.getElementById(id);
          if(el) {
              el.style.display = displayType || 'flex';
              history.pushState({ fribaApp: true }, '');
          }
      };

      window.addEventListener('popstate', function(e) {
          var modals = ['cardDetailModal', 'targetModal', 'scoreModal', 'gmGiveCardModal', 'receiptModal', 'zoomModal', 'handLimitModal', 'shopModal', 'settingsModal', 'courseModal', 'rulesModal', 'cardLibraryModal', 'createCardModal'];
          var closedAny = false;
          for (var i = 0; i < modals.length; i++) {
              var m = document.getElementById(modals[i]);
              if (m && m.style.display !== 'none' && m.style.display !== '') {
                  m.style.display = 'none';
                  closedAny = true;
                  if (modals[i] === 'shopModal') window.pendingShopPurchase = null;
                  break; 
              }
          }
          if (closedAny) { history.pushState({ fribaApp: true }, ''); }
      });
    </script>
</head>
<body class="player-mode">

    <!-- ASETUKSET & OHJEET -->
    <button id="settingsToggleBtn" onclick="window.showModalSafe('settingsModal')" style="position:fixed; top:15px; right:15px; z-index:9500; width:50px; height:50px; border-radius:50%; border:none; background:rgba(255,255,255,0.95); box-shadow: 0 4px 15px rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; font-size:1.8rem; cursor:pointer; color:#111;">⚙️</button>
    
    <div id="notificationContainer"></div> 

    <!-- AULA -->
    <div class="container" id="lobbyContainer">
        <div id="identityCard" class="torn-paper" style="text-align: center; margin-top:50px;">
            <div class="tape tape-tl"></div><div class="tape tape-tr"></div>
            <h2 style="color: var(--primary); font-size: 1.1rem;">Tervetuloa Radalle</h2>
            <input type="text" id="playerNameInput" placeholder="Syötä nimesi..." />
            <button class="btn btn-primary" onclick="if(window.claimIdentity) { window.claimIdentity(); }">KIRJAUDU SISÄÄN</button>
        </div>

        <div id="gameSetupArea" class="torn-paper" style="display:none; text-align:center; margin-top:50px;">
            <div class="tape tape-tl"></div><div class="tape tape-tr"></div>
            <h2 style="color: var(--text-main); font-size:1.4rem; margin-bottom: 10px;">Peli ei ole käynnissä</h2>
            <button class="btn btn-primary" onclick="if(window.startMeilahti) window.startMeilahti();" style="margin-bottom:15px;">🌲 PIKA-ALOITUS: MEILAHTI (16V)</button>
            <button class="btn btn-secondary" onclick="window.showModalSafe('courseModal')">LUO OMA RATA</button>
        </div>
    </div>

    <!-- PELIALUE -->
    <div id="corkboard-viewport" style="display:none;">
        <div id="corkboard-surface">
            <!-- Sisältö generoidaan dynaamisesti -->
        </div>
    </div>

    <div class="corkboard-pocket-container" id="pocketContainer" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:flex-end; width:100%; position:relative; z-index:10; padding: 0 5px; gap: 5px;">
            
            <!-- UUSI KUITIN PIKANAPPI -->
            <div class="pocket-lip board-lip-btn" onclick="window.showModalSafe('receiptModal')" style="padding: 10px; font-size:0.9rem; flex:0.8; text-align:center;">🧾 KUITTI</div>

            <div class="binder-spine-btn" id="ownCardsButtonElement" onclick="if(window.openShop) window.openShop('sell')">
                <div class="binder-stitching"></div>
                <span class="binder-spine-text">KORTIT</span>
                <div class="binder-badge" id="handCountBadge">0</div>
            </div>
            
            <div class="binder-spine-btn" id="shopButtonElement" onclick="if(window.openShop) window.openShop('buy')">
                <div class="binder-stitching"></div>
                <span class="binder-spine-text" style="padding-right: 35px;">KAUPPA</span>
                <div class="binder-badge money-badge" id="myResPointsBtn">0 P</div>
            </div>
            
            <div class="pocket-lip board-lip-btn" id="boardBtnText" onclick="if(window.zoomToCurrentHole) window.zoomToCurrentHole()" style="flex:1.2; text-align:center;">📍 NYKYINEN VÄYLÄ</div>
        </div>
    </div>

    <!-- MUUT MODAALIT (Course, Settings yms) Pidetään samoina, ohitetaan tilan säästämiseksi tässä mallissa, sijoita ne tähän väliin kuten ennenkin -->
    <!-- (Lisää tähän väliin CourseModal, SettingsModal, HandLimitModal yms tiedostostasi) -->
    <div id="receiptModal" class="fullscreen-modal" style="display:none; justify-content:center; align-items:center;" onclick="if(event.target === this) { this.style.display='none'; }">
        <div class="receipt-paper full-receipt" id="receipt-full-content" style="max-height:85vh; overflow-y:auto; width:90%; max-width:400px; padding:30px 20px;"></div>
    </div>

    <!-- PÄIVITETTY KAUPPA / KANSIO MODAALI -->
    <div id="shopModal" class="scrollable-modal" style="padding:0; background:rgba(0,0,0,0.85);" onclick="if(event.target === this) { window.closeShopModal(); }">
        <div class="shop-binder-modal theme-shop" style="background: transparent; box-shadow: none;">
            <div class="binder-swipe-handle" style="background: rgba(255,255,255,0.5);"></div>
            
            <div class="shop-tabs">
                <button id="shopTabSellBtn" class="shop-tab-btn" onclick="event.stopPropagation(); if(window.switchShopTab) window.switchShopTab('sell')">OMAT KORTIT</button>
                <button id="shopTabBuyBtn" class="shop-tab-btn active" onclick="event.stopPropagation(); if(window.switchShopTab) window.switchShopTab('buy')">VÄLIPALA-AUTOMAATTI</button>
            </div>

            <!-- VÄLIPALA-AUTOMAATTI (KAUPPA) -->
            <div id="shopBuyArea" style="position:relative; z-index:20; width: 100%; padding: 10px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; background:#000; padding:10px; border-radius:8px; border:2px solid #333;">
                    <div style="color:#ef4444; font-family:'Courier Prime', monospace; font-weight:900; font-size:1.2rem; text-shadow: 0 0 5px #ef4444;">FRIBAMART</div>
                    <div style="color:#22c55e; font-family:'Courier Prime', monospace; font-size:1.2rem; font-weight:900;">SALDO: <span id="shopModalWallet">0 P</span></div>
                </div>

                <div class="vending-machine" id="vendingMachineContainer">
                    <div class="vending-glass"></div>
                    <!-- Hyllyt generoidaan JS puolelta tähän -->
                    <div id="vendingShelves"></div>
                    <div class="vending-push-door">PUSH</div>
                </div>
            </div>

            <!-- OMAT KORTIT (KANSIO) -->
            <div id="shopSellArea" style="display:none; position:relative; z-index:20; width: 100%; background:#8b4513; min-height:100vh; padding-top:20px;">
                <div style="display: flex; flex: 1; overflow: hidden; position: relative;">
                    <div class="binder-spine" style="left: -15px;">
                        <div class="binder-ring" style="margin-top: 30px;"></div>
                        <div class="binder-ring"></div>
                        <div class="binder-ring" style="margin-bottom: 30px;"></div>
                    </div>
                    <div class="binder-content" style="width: 100%; padding: 0 15px 50px 25px;">
                        <h2 style="color:#fff; font-size:1.5rem; margin-bottom:20px; font-family:'Kalam', cursive;">Omat Kortit</h2>
                        <div id="pendingPurchaseAlert" style="display:none; background:var(--danger); color:#fff; padding:16px; border-radius:12px; margin-bottom:20px;"></div>
                        
                        <div id="shopSellCardsContainer" style="display:flex; flex-direction:column; gap:20px;">
                            <!-- Omat kortit generoidaan tähän -->
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- TARGET MODAALI -->
    <div id="targetModal" class="winner-overlay" style="z-index: 10001;" onclick="if(event.target === this) { this.style.display='none'; }">
        <div class="card glass-card" style="width: 100%; max-width: 400px; border: 4px solid var(--danger);">
            <h2 style="color:var(--text-main);">Valitse sabotaasin kohde</h2>
            <p id="targetCardName" style="color: var(--danger); font-weight: 900; margin-bottom: 20px; font-size: 1.5rem; text-align:center; text-transform:uppercase; line-height:1.2;"></p>
            <div id="targetPlayerList" style="margin-bottom: 20px;"></div>
            <button class="btn btn-secondary glass-card" onclick="document.getElementById('targetModal').style.display='none'">PERUUTA</button>
        </div>
    </div>

    <!-- SCORE / ZOOM / CAROUSEL Modaalit sijoitetaan normaalisti tähän -->

    <script src="tasks.js?v=180"></script>
    <script type="module" src="script.js?v=180"></script>
</body>
</html>
