<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fribamestari</title>
    <link rel="apple-touch-icon" href="friba.png">
    
    <link rel="stylesheet" href="style.css?v=8">
    <meta name="theme-color" content="#121212">

    <script>
      window.onerror = function(msg, url, line) { alert("Bugi: " + msg + " (Rivi: " + line + ")"); };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body class="player-mode">

    <div class="container">
        <div class="role-switcher">
            <button id="btnPlayer" class="role-btn player active" onclick="if(window.setRole) window.setRole('player')">Pelaaja</button>
            <button id="btnGM" class="role-btn gm">Game Master</button>
        </div>

        <div id="identityCard" class="card" style="border: 2px solid var(--primary);">
            <h2>Kirjaudu sisään</h2>
            <input type="text" id="playerNameInput" placeholder="Pelaajan nimi...">
            <button class="btn btn-primary" onclick="if(window.claimIdentity) window.claimIdentity()">ASTU TII-PAIKALLE</button>
        </div>

        <!-- Upsi-tyylinen radan yläpalkki -->
        <div id="courseInfoBanner" class="card" style="display: none; background: var(--surface-light); text-align: center; padding: 15px;">
            <div style="font-size: 1rem; color: var(--text-muted); font-weight: 600; margin-bottom: 5px; text-transform: uppercase;" id="bannerCourseName">Rata</div>
            <div style="display: flex; justify-content: center; align-items: baseline; gap: 15px;">
                <div style="font-size: 1.2rem; color: var(--text-main);">VÄYLÄ <span id="bannerHoleNum" style="font-size: 2rem; font-weight: 900; color: var(--primary);">1</span></div>
                <div style="font-size: 1.2rem; color: var(--text-muted);">PAR <span id="bannerPar" style="font-size: 1.5rem; font-weight: 800; color: var(--text-main);">3</span></div>
            </div>
        </div>

        <button class="btn btn-secondary" onclick="if(window.nextHole) window.nextHole()" style="margin-bottom: 16px;">Seuraava väylä ➡️</button>

        <div class="gm-only" id="gmGlobalControls" style="display:none; margin-bottom: 16px;">
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="btn btn-secondary" onclick="document.getElementById('courseModal').style.display='flex'">📍 1. Luo uusi rata</button>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-arvo" onclick="if(window.rollHoleRules) window.rollHoleRules()" style="flex: 1;">🎲 2. Arvo sääntö</button>
                    <button class="btn btn-primary" onclick="if(window.openScoreModal) window.openScoreModal()" style="flex: 1;">📝 3. Syötä tulokset</button>
                </div>
            </div>
        </div>

        <div id="activeHoleContainer"></div>

        <div class="player-only" id="playerActionArea">
            <div class="card" style="border-left: 4px solid var(--danger);">
                <h2>Omat Kortit</h2>
                <div id="playerHand" class="hand-scroll-area"></div>
            </div>
            
            <div class="card" style="border-left: 4px solid var(--warning);">
                <h2 style="display: flex; justify-content: space-between; align-items: center;">Kauppa <span id="myResPoints" style="color: var(--warning); font-size: 1.2rem; font-weight: 900;">0 P</span></h2>
                <div id="shopItems" class="shop-grid"></div>
            </div>
        </div>

        <!-- GM ASETUKSET -->
        <div class="gm-only" style="margin-top: 20px;">
            <button class="btn btn-secondary" onclick="document.getElementById('adminPanel').style.display = document.getElementById('adminPanel').style.display === 'none' ? 'block' : 'none'">⚙️ Asetukset & Lokit</button>
            
            <div id="adminPanel" class="card" style="display:none; margin-top:10px;">
                <h2>Pelaajat</h2>
                <div id="adminPlayerList"></div>
                <div style="display: flex; gap: 10px; margin-top:15px; margin-bottom:15px;">
                    <input type="text" id="adminNewPlayerName" placeholder="Nimi..." style="margin: 0;">
                    <button class="btn btn-success" style="width: auto; padding: 0 20px;" onclick="if(window.adminAddPlayer) window.adminAddPlayer()">Lisää</button>
                </div>

                <h2 style="margin-top:20px;">Tapahtumat</h2>
                <div id="adminEventLog" style="max-height:150px; overflow-y:auto; font-size:0.85rem; background:var(--bg-dark); padding:12px; border-radius:8px; color: var(--text-muted);"></div>

                <h2 style="margin-top:20px;">Pistehistoria</h2>
                <div id="adminScoreLog" style="max-height:150px; overflow-y:auto; font-size:0.85rem; background:var(--bg-dark); padding:12px; border-radius:8px; color: var(--text-muted);"></div>

                <button class="btn btn-danger" style="margin-top: 20px;" onclick="if(window.resetGame) window.resetGame()">Nollaa tietokanta</button>
            </div>
        </div>

        <div class="card" style="margin-top: 16px;">
            <h2>Tulostaulu</h2>
            <div id="playerList"></div>
        </div>
    </div>

    <!-- Modaalit -->
    <!-- 1. Radan luonti -->
    <div id="courseModal" class="winner-overlay" style="display:none;">
        <div class="card" style="width: 100%; max-width: 450px;">
            <h2>Radan asetukset</h2>
            <input type="text" id="setupCourseName" placeholder="Radan nimi">
            <input type="number" id="setupHoleCount" placeholder="Väylien määrä (esim. 18)" oninput="if(window.generateParInputs) window.generateParInputs()">
            <div id="parInputsContainer" style="max-height: 250px; overflow-y: auto; margin-bottom: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            <button class="btn btn-primary" onclick="if(window.saveCourseSetup) window.saveCourseSetup()">Tallenna rata</button>
            <button class="btn btn-secondary" style="margin-top: 10px;" onclick="document.getElementById('courseModal').style.display='none'">Peruuta</button>
        </div>
    </div>

    <!-- 2. Tulosten syöttö (Upsi-tyyli) -->
    <div id="scoreModal" class="winner-overlay" style="display:none;">
        <div class="card" style="width: 100%; max-width: 450px; padding: 25px 20px;">
            <div style="text-align: center; margin-bottom: 20px;">
                <h2 style="color:var(--text-main); font-size: 1.4rem; margin-bottom: 5px;">VÄYLÄ <span id="scoreModalHoleNum">1</span></h2>
                <p style="color: var(--text-muted); font-size:1.1rem;">Par <strong id="scoreModalPar" style="color:var(--text-main);">3</strong></p>
            </div>
            
            <div id="scoreInputsContainer" style="margin-bottom: 25px;"></div>
            
            <!-- Erikoistehtävä -->
            <div style="background: var(--surface-light); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <label style="color: var(--warning); font-size: 0.85rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block;">Väylätehtävän suorittaja (+5 P)</label>
                <select id="taskWinnerSelect" style="margin: 0; background: var(--bg-dark); border: none;"></select>
            </div>

            <button class="btn btn-primary" onclick="if(window.submitScores) window.submitScores()">Tallenna tulokset</button>
            <button class="btn btn-secondary" style="margin-top: 10px;" onclick="document.getElementById('scoreModal').style.display='none'">Peruuta</button>
        </div>
    </div>

    <!-- 3. Kohdistus -->
    <div id="targetModal" class="winner-overlay" style="display:none;">
        <div class="card" style="width: 100%; max-width: 400px; border-left: 6px solid var(--danger);">
            <h2 style="color: var(--text-main); margin-bottom: 5px;">Valitse kohde</h2>
            <p id="targetCardName" style="color: var(--text-muted); font-weight: 600; margin-bottom: 20px; font-size: 1.1rem;"></p>
            <div id="targetPlayerList" style="margin-bottom: 15px;"></div>
            <button class="btn btn-secondary" onclick="document.getElementById('targetModal').style.display='none'">Peruuta</button>
        </div>
    </div>

    <!-- 4. Popup -->
    <div id="lotteryWinner" class="winner-overlay" style="display:none;">
        <div class="card" style="text-align: center; width: 100%; max-width: 400px;">
            <h1 id="popupTitle" style="color: var(--text-main); margin-bottom: 10px; font-size: 1.6rem; text-transform: uppercase;">Ilmoitus</h1>
            <p id="popupDesc" style="font-size:1.1rem; color:var(--text-muted); margin-bottom: 15px;"></p>
            <div id="popupDetails" style="background: var(--bg-dark); padding: 15px; border-radius: 8px; font-size: 1rem; line-height: 1.5; text-align: left;"></div>
        </div>
    </div>

    <script src="tasks.js?v=2"></script>
    <script type="module" src="script.js?v=8"></script>
</body>
</html>
