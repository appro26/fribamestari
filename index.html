<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fribamestari</title>
    <link rel="stylesheet" href="style.css?v=28">
    <script>window.onerror = function(msg, url, line) { alert("Virhe: " + msg); };</script>
</head>
<body class="player-mode">

    <div id="notificationContainer"></div> 

    <div class="container">
        
        <!-- Yläpalkki -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div id="topWallet" class="top-wallet" style="display:none;">💰 <span id="topWalletPoints">0 P</span></div>
        </div>

        <div id="identityCard" class="card" style="border: 3px solid var(--primary); text-align: center;">
            <h2 style="color: var(--primary);">Tervetuloa Radalle</h2>
            <input type="text" id="playerNameInput" placeholder="Syötä nimesi...">
            <button class="btn btn-primary" onclick="if(window.claimIdentity) window.claimIdentity()">KIRJAUDU SISÄÄN</button>
        </div>

        <div id="gameSetupArea" class="card" style="display:none; text-align:center;">
            <button class="btn btn-primary" onclick="document.getElementById('courseModal').style.display='flex'">ALOITA PELI</button>
        </div>

        <div id="mainGameArea" style="display:none;">
            <div style="display: flex; gap: 10px; align-items: stretch; margin-bottom: 15px;">
                <div id="courseInfoBanner" class="card" style="flex: 1; margin: 0; padding: 12px;">
                    <div style="font-size: 0.7rem; color: var(--text-muted);" id="bannerCourseName">Rata</div>
                    <div style="font-weight: 900; font-size: 1.2rem;">VÄYLÄ <span id="bannerHoleNum">1</span> (PAR <span id="bannerPar">3</span>)</div>
                </div>
                <button class="btn btn-primary" onclick="if(window.nextHole) window.nextHole()" style="width: auto; padding: 0 15px;">TULOKSET</button>
            </div>

            <div id="activeHoleContainer"></div>
            <div id="myActiveRulesContainer" style="display:none;"></div>
            
            <div class="player-only">
                <div id="compactViewContainer" class="grid-2" style="margin-bottom: 15px;">
                    <button class="btn btn-danger" onclick="document.getElementById('handModal').style.display='flex'">🃏 Kortit</button>
                    <button class="btn btn-warning" onclick="document.getElementById('shopModal').style.display='flex'">🛒 Kauppa</button>
                </div>
                <div id="expandedViewContainer" style="display:none;">
                    <div class="card"><h2>Omat Kortit</h2><div id="playerHandExpanded" class="cards-list-1"></div></div>
                    <div class="card"><h2>Kauppa</h2><div id="shopItemsExpanded" class="cards-list-1"></div></div>
                </div>
                <button class="btn btn-secondary" onclick="if(window.toggleView) window.toggleView()" id="viewToggleBtn" style="margin-bottom:15px;">LAAJENNETTU NÄKYMÄ</button>
            </div>
        </div> 

        <div class="gm-only" id="adminPanel" style="display:none;">
            <div class="card">
                <h2>GM HALLINTA</h2>
                <div id="adminPlayerList"></div>
                <h2>Lisää kortti pelaajalle</h2>
                <div id="gmCardManager" style="margin-bottom:15px;"></div>
                <div id="adminEventLog" class="log-box"></div>
                <button class="btn btn-danger" style="margin-top:10px;" onclick="if(window.resetGame) window.resetGame()">NOLLAA PELI</button>
            </div>
        </div>

        <!-- Roolinvaihto siirretty alas -->
        <div class="role-switcher">
            <button id="btnPlayer" class="role-btn player active" onclick="if(window.setRole) window.setRole('player')">PELAAJA</button>
            <button id="btnGM" class="role-btn gm" onclick="if(window.setRole) window.setRole('gm')">GM</button>
        </div>

        <div class="card" style="margin-top: 15px; border-top: 4px solid var(--text-main);">
            <h2>🏆 Tuloskortti</h2>
            <div id="playerList"></div>
        </div>
    </div>

    <!-- Modaalit -->
    <div id="handModal" class="fullscreen-modal"><div class="fullscreen-modal-header"><h2>OMAT KORTIT</h2><button class="close-modal-btn" onclick="document.getElementById('handModal').style.display='none'">&times;</button></div><div id="handModalCards" class="cards-grid-2"></div></div>
    <div id="shopModal" class="fullscreen-modal"><div class="fullscreen-modal-header"><h2>KAUPPA</h2><button class="close-modal-btn" onclick="document.getElementById('shopModal').style.display='none'">&times;</button></div><div id="shopModalCards" class="cards-grid-2"></div></div>
    <div id="courseModal" class="winner-overlay">...</div>
    <div id="scoreModal" class="winner-overlay">...</div>
    <div id="targetModal" class="winner-overlay">...</div>
    <div id="lotteryWinner" class="winner-overlay">...</div>

    <script src="tasks.js?v=28"></script>
    <script type="module" src="script.js?v=28"></script>
</body>
</html>
