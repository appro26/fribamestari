<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fribamestari</title>
    <link rel="apple-touch-icon" href="friba.png">
    <link rel="stylesheet" href="style.css?v=5">
    <meta name="theme-color" content="#0a0a0c">

    <script>
      window.onerror = function(msg, url, line) { alert("Bugi: " + msg + " (Rivi: " + line + ")"); };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body class="player-mode">

    <div class="role-switcher">
        <button id="btnPlayer" class="role-btn player active" onclick="if(window.setRole) window.setRole('player')">PELAAJA</button>
        <button id="btnGM" class="role-btn gm">GAME MASTER</button>
    </div>

    <div class="container">
        
        <div id="identityCard" class="card">
            <h2>Kuka heittää?</h2>
            <input type="text" id="playerNameInput" placeholder="Syötä nimesi...">
            <button class="btn btn-primary" onclick="if(window.claimIdentity) window.claimIdentity()">ASTU TII-PAIKALLE</button>
        </div>

        <div id="courseInfoBanner" class="course-info-banner" style="display: none;">
            <div><strong id="bannerCourseName" style="color: var(--gold);">Rata: ?</strong></div>
            <div style="font-weight: 800;">VÄYLÄ <span id="bannerHoleNum" style="color: var(--accent);">1</span> | PAR <span id="bannerPar">3</span></div>
        </div>

        <div class="gm-only" id="gmGlobalControls" style="display:none; margin-bottom: 15px; position: relative; z-index: 50;">
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="btn btn-secondary" onclick="document.getElementById('courseModal').style.display='flex'" style="border-color: var(--accent); color: var(--accent);">📍 1. LUO UUSI RATA (ASETUKSET)</button>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-arvo" onclick="if(window.rollHoleRules) window.rollHoleRules()" style="flex: 1;">🎲 2. ARVO VÄYLÄ & KAUPPA</button>
                    <button class="btn btn-primary" onclick="if(window.openScoreModal) window.openScoreModal()" style="flex: 1;">📝 3. SYÖTÄ TULOKSET</button>
                </div>
            </div>
        </div>

        <div id="activeHoleContainer"></div>

        <div class="player-only" id="playerActionArea">
            <div class="card" style="border-color: var(--accent);">
                <h2>Oma Käsi (Kortit)</h2>
                <div id="playerHand"></div>
            </div>
            
            <div class="card" style="border-color: var(--gold); margin-top: 15px;">
                <h2>Kauppa <span id="myResPoints" style="color: var(--gold); float: right;">0 P</span></h2>
                <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 10px;">Nopein vie! Nämä kortit poistuvat kaupasta heti kun joku ostaa ne.</p>
                <div id="shopItems"></div>
            </div>
        </div>

        <div class="card" style="margin-top: 15px;">
            <h2>Tulostaulu (Leaderboard)</h2>
            <div id="playerList"></div>
        </div>
    </div>

    <!-- Modaalit -->
    <!-- 1. Radan luonti (GM) -->
    <div id="courseModal" class="winner-overlay" style="display:none;">
        <div class="card" style="width: 100%; max-width: 400px; border-color: var(--accent);">
            <h2>Luo Uusi Rata</h2>
            <input type="text" id="setupCourseName" placeholder="Radan nimi (esim. Meilahti)">
            <input type="number" id="setupHoleCount" placeholder="Väylien määrä (esim. 9)" oninput="window.generateParInputs()">
            <div id="parInputsContainer" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;"></div>
            <button class="btn btn-success" onclick="if(window.saveCourseSetup) window.saveCourseSetup()">TALLENNA & ALOITA</button>
            <button class="btn btn-secondary" style="margin-top: 10px;" onclick="document.getElementById('courseModal').style.display='none'">PERUUTA</button>
        </div>
    </div>

    <!-- 2. Kohdistus (Target) -->
    <div id="targetModal" class="winner-overlay" style="display:none;">
        <div class="card" style="width: 100%; max-width: 400px; border-color: var(--danger); box-shadow: 0 0 20px var(--danger-glow);">
            <h2 style="color: var(--danger);">Kenelle pelaat kortin?</h2>
            <p id="targetCardName" style="color: var(--gold); font-weight: bold; text-align: center; margin-bottom: 15px; font-size: 1.2rem;"></p>
            <div id="targetPlayerList" style="margin-bottom: 15px;"></div>
            <button class="btn btn-secondary" onclick="document.getElementById('targetModal').style.display='none'">PERUUTA</button>
        </div>
    </div>

    <!-- 3. Tulosten syöttö (GM) -->
    <div id="scoreModal" class="winner-overlay" style="display:none;">
        <div class="card" style="width: 100%; max-width: 450px; border-color: var(--success);">
            <h2 style="color:var(--success);">SYÖTÄ TULOKSET (VÄYLÄ <span id="scoreModalHoleNum">1</span>)</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 15px;">Par tälle väylälle: <strong id="scoreModalPar" style="color:#fff;">3</strong></p>
            <div id="scoreInputsContainer"></div>
            <button class="btn btn-success" onclick="if(window.submitScores) window.submitScores()" style="margin-top: 20px;">TALLENNA TULOKSET</button>
            <button class="btn btn-secondary" style="margin-top: 10px;" onclick="document.getElementById('scoreModal').style.display='none'">PERUUTA</button>
        </div>
    </div>

    <!-- 4. Tapahtuma/Ilmoitus Popup -->
    <div id="lotteryWinner" class="winner-overlay" style="display:none; flex-direction: column;">
        <div class="card" style="text-align: center; animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; border-color: var(--accent); box-shadow: 0 0 40px var(--accent-glow);">
            <h1 id="popupTitle" style="color: var(--accent); margin-bottom: 10px; font-size: 1.8rem;">ILMOITUS</h1>
            <p id="popupDesc" style="font-size:1.1rem; color:var(--text-main); margin-bottom: 15px;"></p>
            <div id="popupDetails" style="background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;"></div>
        </div>
    </div>

    <script src="tasks.js?v=2"></script>
    <script type="module" src="script.js?v=5"></script>
</body>
</html>
